name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Build Python wheels and publish to PyPI
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build deps
        run: pip install build twine
      
      - name: Build wheel
        run: python -m build
      
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # Skip if version already exists on PyPI
          twine upload dist/* || echo "Version may already exist, continuing"

  # Build standalone binaries with PyInstaller
  binaries:
    needs: []  # Run independently, don't wait for pypi
    strategy:
      fail-fast: false  # Don't cancel other OS builds if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install pyinstaller -e .
      
      - name: Build binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --name shadow-ai-vnc $(python -c "import shadow_ai_vnc; print(shadow_ai_vnc.__file__)")
          tar czf shadow-ai-vnc-${{ matrix.os }}.tar.gz dist/shadow-ai-vnc
      
      - name: Build binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name shadow-ai-vnc.exe $(python -c "import shadow_ai_vnc; print(shadow_ai_vnc.__file__)")
          Compress-Archive -Path dist/shadow-ai-vnc.exe -Destination shadow-ai-vnc-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            shadow-ai-vnc-*.tar.gz
            shadow-ai-vnc-*.zip
