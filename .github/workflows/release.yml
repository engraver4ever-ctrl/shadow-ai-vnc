name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Build Python wheels and publish to PyPI
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build deps
        run: pip install build twine
      
      - name: Build wheel
        run: python -m build
      
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # Build standalone binaries with PyInstaller
  binaries:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install pyinstaller -r requirements.txt
      
      - name: Build binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --name shadow-ai-vnc shadow-ai-vnc.py
          tar czf shadow-ai-vnc-${{ matrix.os }}.tar.gz dist/shadow-ai-vnc
      
      - name: Build binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name shadow-ai-vnc.exe shadow-ai-vnc.py
          Compress-Archive -Path dist/shadow-ai-vnc.exe -Destination shadow-ai-vnc-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            shadow-ai-vnc-*.tar.gz
            shadow-ai-vnc-*.zip

  # Build and push Docker image to GitHub Container Registry
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/${{ github.repository }}/shadow-ai-vnc:latest
            ghcr.io/${{ github.repository }}/shadow-ai-vnc:${{ github.ref_name }}